<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="evaCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8b4d9" stop-opacity="1"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="evaRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="evaGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="evaSoftGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="40" cy="40" r="34" fill="none" stroke="#c084fc" stroke-width="1"
    stroke-opacity="0.4" filter="url(#evaSoftGlow)"/>

  <!-- Middle ring -->
  <circle cx="40" cy="40" r="27" fill="none" stroke="#c084fc" stroke-width="0.75"
    stroke-opacity="0.25"/>

  <!-- Diamond frame — 4 points -->
  <polygon points="40,8 68,40 40,72 12,40"
    fill="none" stroke="#c084fc" stroke-width="1.2"
    stroke-opacity="0.5" filter="url(#evaSoftGlow)"/>

  <!-- Corner accent marks at diamond tips -->
  <circle cx="40" cy="8"  r="1.8" fill="#e879f9" filter="url(#evaGlow)"/>
  <circle cx="68" cy="40" r="1.8" fill="#e879f9" filter="url(#evaGlow)"/>
  <circle cx="40" cy="72" r="1.8" fill="#e879f9" filter="url(#evaGlow)"/>
  <circle cx="12" cy="40" r="1.8" fill="#e879f9" filter="url(#evaGlow)"/>

  <!-- Inner diamond (rotated 45°) -->
  <polygon points="40,20 56,40 40,60 24,40"
    fill="rgba(124,58,237,0.06)" stroke="#c084fc" stroke-width="0.75"
    stroke-opacity="0.3"/>

  <!-- Glow fill -->
  <circle cx="40" cy="40" r="18" fill="url(#evaRing)" opacity="0.3"/>

  <!-- Outer iris -->
  <circle cx="40" cy="40" r="13" fill="none" stroke="#c084fc" stroke-width="1.2"
    filter="url(#evaSoftGlow)"/>

  <!-- Inner iris -->
  <circle cx="40" cy="40" r="8" fill="rgba(192,132,252,0.1)" stroke="#e879f9"
    stroke-width="0.75" filter="url(#evaSoftGlow)"/>

  <!-- Pupil -->
  <circle cx="40" cy="40" r="4" fill="url(#evaCore)" filter="url(#evaGlow)"/>

  <!-- Pupil dark -->
  <circle cx="40" cy="40" r="2" fill="#1a0a2e"/>

  <!-- Pupil highlight -->
  <circle cx="41.2" cy="38.8" r="0.9" fill="#ffffff" opacity="0.85"/>

  <!-- Cross hair lines -->
  <line x1="40" y1="28" x2="40" y2="32" stroke="#c084fc" stroke-width="0.75" opacity="0.6"/>
  <line x1="40" y1="48" x2="40" y2="52" stroke="#c084fc" stroke-width="0.75" opacity="0.6"/>
  <line x1="28" y1="40" x2="32" y2="40" stroke="#c084fc" stroke-width="0.75" opacity="0.6"/>
  <line x1="48" y1="40" x2="52" y2="40" stroke="#c084fc" stroke-width="0.75" opacity="0.6"/>

  <!-- Diagonal accents -->
  <line x1="31" y1="31" x2="33.5" y2="33.5" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="49" y1="31" x2="46.5" y2="33.5" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="31" y1="49" x2="33.5" y2="46.5" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="49" y1="49" x2="46.5" y2="46.5" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
</svg>
