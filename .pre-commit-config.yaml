repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest quick checks
        entry: python3 -m pytest -q tests/test_audit.py tests/test_policy.py tests/test_config.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
